<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ASM Panel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
  background: #0a0800;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 20px #d4af3744; }
  50% { box-shadow: 0 0 45px #d4af37aa; }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(40px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes shimmerLine {
  0% { left:-100%; }
  100% { left:200%; }
}
@keyframes textureMove {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.05); }
}
@keyframes lockBounce {
  0%,100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-5px) rotate(-5deg); }
  75% { transform: translateY(-5px) rotate(5deg); }
}

#bgWrap { position:fixed; inset:0; z-index:0; overflow:hidden; }
.base {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% 20%, #3d2a00 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #2a1a00 0%, transparent 50%),
    linear-gradient(135deg, #0d0800 0%, #1a1000 25%, #0f0900 50%, #1f1500 75%, #0a0600 100%);
  animation: textureMove 20s ease-in-out infinite;
  background-size: 400% 400%;
}
.veins {
  position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(45deg, transparent 0px, transparent 18px, rgba(212,175,55,0.03) 18px, rgba(212,175,55,0.03) 19px),
    repeating-linear-gradient(-45deg, transparent 0px, transparent 28px, rgba(180,140,40,0.025) 28px, rgba(180,140,40,0.025) 29px);
  background-size: 60px 60px, 80px 80px;
}
.orb { position:absolute; border-radius:50%; filter:blur(70px); animation:orbFloat ease-in-out infinite; }
.orb1 { width:300px; height:300px; background:radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); top:-80px; left:-60px; animation-duration:12s; }
.orb2 { width:250px; height:250px; background:radial-gradient(circle, rgba(255,200,50,0.07) 0%, transparent 70%); bottom:10%; right:-40px; animation-duration:15s; animation-delay:4s; }

.page {
  position:relative; z-index:10;
  width:100%; max-width:400px;
  animation: slideUp 0.8s ease;
}

.logo-wrap { text-align:center; margin-bottom:30px; }
.logo {
  font-size:26px; font-weight:900;
  background: linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #ffe566, #d4af37, #b8860b);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: goldShimmer 2.5s linear infinite;
  letter-spacing:3px;
}
.logo-sub { color:#5a3e15; font-size:12px; margin-top:4px; }

.card {
  background: linear-gradient(135deg, rgba(15,10,0,0.92), rgba(28,18,0,0.92));
  border: 1px solid rgba(212,175,55,0.3);
  border-radius:24px;
  padding:30px 24px;
  backdrop-filter:blur(20px);
  position:relative; overflow:hidden;
  animation: pulse 3s infinite;
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, #ffd700, #d4af37, #ffd700, transparent);
  animation: goldShimmer 2s linear infinite;
  background-size:200% auto;
}
.card::after {
  content:'';
  position:absolute; top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.04), transparent);
  animation: shimmerLine 4s linear infinite;
}

/* Lock icon */
.lock-wrap {
  text-align:center;
  margin-bottom:20px;
}
.lock-icon {
  font-size:50px;
  display:inline-block;
  animation: lockBounce 3s ease-in-out infinite;
  filter: drop-shadow(0 0 15px rgba(212,175,55,0.5));
}

.card-title {
  font-size:22px; font-weight:800; text-align:center; margin-bottom:6px;
  background: linear-gradient(90deg, #d4af37, #ffd700, #ffe566);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.card-sub { text-align:center; color:#5a3e15; font-size:12px; margin-bottom:25px; }

.input-group { margin-bottom:16px; }
.input-label { font-size:12px; color:#8b6520; margin-bottom:6px; display:block; letter-spacing:0.5px; }
.input-wrap { position:relative; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; }

input[type="email"],
input[type="password"],
input[type="text"] {
  width:100%;
  padding:13px 14px 13px 42px;
  background:rgba(20,13,0,0.8);
  border:1px solid rgba(212,175,55,0.2);
  border-radius:12px;
  color:#fff;
  font-size:14px;
  outline:none;
  transition:all 0.3s;
  font-family:'Segoe UI', sans-serif;
}
input:focus {
  border-color:rgba(212,175,55,0.6);
  box-shadow:0 0 15px rgba(212,175,55,0.15);
  background:rgba(30,20,0,0.9);
}
input::placeholder { color:#3a2a08; }

/* Show password toggle */
.show-pass {
  position:absolute;
  right:14px; top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:16px;
  opacity:0.6;
  transition:opacity 0.2s;
}
.show-pass:hover { opacity:1; }

.forgot-link {
  text-align:right;
  margin-top:-8px;
  margin-bottom:16px;
}
.forgot-link a { color:#d4af37; font-size:12px; text-decoration:none; }

/* Remember me */
.remember-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}
.remember-row input[type="checkbox"] {
  width:16px; height:16px; padding:0;
  accent-color:#d4af37;
}
.remember-row label { font-size:12px; color:#5a3e15; }

.btn-submit {
  width:100%;
  padding:15px;
  background: linear-gradient(135deg, #8b6914, #d4af37, #ffd700, #d4af37);
  background-size:200% auto;
  animation: goldShimmer 3s linear infinite;
  color:#000;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:all 0.3s;
  box-shadow: 0 0 25px rgba(212,175,55,0.4), 0 5px 20px rgba(0,0,0,0.5);
  letter-spacing:1px;
}
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(212,175,55,0.6); }
.btn-submit:active { transform:scale(0.98); }

.divider {
  display:flex; align-items:center; gap:12px;
  margin:20px 0;
}
.divider-line { flex:1; height:1px; background:rgba(212,175,55,0.15); }
.divider-text { color:#3a2a08; font-size:11px; }

.signup-link { text-align:center; font-size:13px; color:#5a3e15; }
.signup-link a { color:#d4af37; text-decoration:none; font-weight:700; }

/* Welcome back message */
.welcome-back {
  background: linear-gradient(135deg, rgba(10,7,0,0.8), rgba(20,13,0,0.8));
  border:1px solid rgba(212,175,55,0.2);
  border-radius:12px;
  padding:12px 16px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}
.wb-icon { font-size:20px; animation:float 3s ease-in-out infinite; }
.wb-text { font-size:12px; color:#8b6520; line-height:1.5; }

/* Error msg */
.error-msg {
  background:rgba(255,50,50,0.1);
  border:1px solid rgba(255,80,80,0.3);
  border-radius:10px;
  padding:10px 14px;
  font-size:12px;
  color:#ff8080;
  margin-bottom:15px;
  display:none;
  text-align:center;
}
</style>
</head>
<body>

<div id="bgWrap">
  <div class="base"></div>
  <div class="veins"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="page">
  <div class="logo-wrap">
    <div class="logo">⚡ ASM PANEL</div>
    <div class="logo-sub">Premium SMM Services</div>
  </div>

  <div class="card">
    <div class="lock-wrap">
      <span class="lock-icon">🔐</span>
    </div>

    <div class="card-title">Welcome Back</div>
    <div class="card-sub">Login to access your ASM Panel account</div>

    <div class="welcome-back">
      <span class="wb-icon">👋</span>
      <span class="wb-text">Your orders, balance and rank are waiting for you!</span>
    </div>

    <div class="error-msg" id="errorMsg">❌ Invalid email or password. Please try again.</div>

    <div class="input-group">
      <label class="input-label">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="Enter your email">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password">
        <span class="show-pass" onclick="togglePass()" id="eyeIcon">👁️</span>
      </div>
    </div>

    <div class="forgot-link">
      <a href="#">Forgot Password?</a>
    </div>

    <div class="remember-row">
      <input type="checkbox" id="remember">
      <label for="remember">Remember me on this device</label>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">🔓 Login to ASM Panel</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Don't have an account?</div>
      <div class="divider-line"></div>
    </div>

    <div class="signup-link">
      <a href="signup.html">✨ Create New Account</a>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAO206UbraVsTWu5jV14XidgjMYXLRXQmw",
    authDomain: "famex-y.firebaseapp.com",
    projectId: "famex-y",
    storageBucket: "famex-y.firebasestorage.app",
    messagingSenderId: "623896096501",
    appId: "1:623896096501:web:f6c06ec82cad1a1e685fbc"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.togglePass = function() {
    const pass = document.getElementById('password');
    const eye = document.getElementById('eyeIcon');
    pass.type = pass.type === 'password' ? 'text' : 'password';
    eye.textContent = pass.type === 'password' ? '👁️' : '🙈';
  };

  window.handleLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    if (!email || !password) { alert('Please fill in all fields'); return; }

    btn.textContent = '⏳ Logging in...';
    btn.style.pointerEvents = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'index.html';
    } catch (error) {
      errorMsg.style.display = 'block';
      btn.textContent = '🔓 Login to ASM Panel';
      btn.style.pointerEvents = 'auto';
    }
  };
</script>
</body>
</html>
