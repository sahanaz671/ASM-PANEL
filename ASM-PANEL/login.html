<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ASM Panel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
  background: #0a0800;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 20px #d4af3744; }
  50% { box-shadow: 0 0 45px #d4af37aa; }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(40px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes textureMove {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.05); }
}
@keyframes lockBounce {
  0%,100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-5px) rotate(-5deg); }
  75% { transform: translateY(-5px) rotate(5deg); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

#bgWrap { position:fixed; inset:0; z-index:0; overflow:hidden; }
.base {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% 20%, #3d2a00 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #2a1a00 0%, transparent 50%),
    linear-gradient(135deg, #0d0800 0%, #1a1000 25%, #0f0900 50%, #1f1500 75%, #0a0600 100%);
  animation: textureMove 20s ease-in-out infinite;
  background-size: 400% 400%;
}
.veins {
  position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(45deg, transparent 0px, transparent 18px, rgba(212,175,55,0.03) 18px, rgba(212,175,55,0.03) 19px),
    repeating-linear-gradient(-45deg, transparent 0px, transparent 28px, rgba(180,140,40,0.025) 28px, rgba(180,140,40,0.025) 29px);
  background-size: 60px 60px, 80px 80px;
}
.orb { position:absolute; border-radius:50%; filter:blur(70px); animation:orbFloat ease-in-out infinite; }
.orb1 { width:300px; height:300px; background:radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); top:-80px; left:-60px; animation-duration:12s; }
.orb2 { width:250px; height:250px; background:radial-gradient(circle, rgba(255,200,50,0.07) 0%, transparent 70%); bottom:10%; right:-40px; animation-duration:15s; animation-delay:4s; }

.page { position:relative; z-index:10; width:100%; max-width:400px; animation: slideUp 0.8s ease; }

.logo-wrap { text-align:center; margin-bottom:25px; }
.logo {
  font-size:26px; font-weight:900;
  background: linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #ffe566, #d4af37, #b8860b);
  background-size:200% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation: goldShimmer 2.5s linear infinite;
  letter-spacing:3px;
}
.logo-sub { color:#5a3e15; font-size:12px; margin-top:4px; }

.card {
  background: linear-gradient(135deg, rgba(15,10,0,0.92), rgba(28,18,0,0.92));
  border: 1px solid rgba(212,175,55,0.3);
  border-radius:24px; padding:30px 24px;
  backdrop-filter:blur(20px);
  position:relative; overflow:hidden;
  animation: pulse 3s infinite;
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, #ffd700, #d4af37, #ffd700, transparent);
  animation: goldShimmer 2s linear infinite;
  background-size:200% auto;
}

.lock-wrap { text-align:center; margin-bottom:18px; }
.lock-icon {
  font-size:48px; display:inline-block;
  animation: lockBounce 3s ease-in-out infinite;
  filter: drop-shadow(0 0 15px rgba(212,175,55,0.5));
}

.card-title {
  font-size:22px; font-weight:800; text-align:center; margin-bottom:6px;
  background: linear-gradient(90deg, #d4af37, #ffd700, #ffe566);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.card-sub { text-align:center; color:#5a3e15; font-size:12px; margin-bottom:22px; }

.google-btn {
  width: 100%; padding: 13px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 14px;
  color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 18px;
  transition: all 0.3s;
}
.google-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(212,175,55,0.5); }
.google-icon { width: 18px; height: 18px; }

.divider { display:flex; align-items:center; gap:12px; margin:18px 0; }
.divider-line { flex:1; height:1px; background:rgba(212,175,55,0.15); }
.divider-text { color:#3a2a08; font-size:11px; }

.input-group { margin-bottom:15px; }
.input-label { font-size:12px; color:#8b6520; margin-bottom:6px; display:block; }
.input-wrap { position:relative; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; }

input[type="email"], input[type="password"], input[type="text"] {
  width:100%;
  padding:13px 14px 13px 42px;
  background:rgba(20,13,0,0.8);
  border:1px solid rgba(212,175,55,0.2);
  border-radius:12px;
  color:#fff; font-size:14px; outline:none;
  transition:all 0.3s;
  font-family:'Segoe UI', sans-serif;
}
input:focus { border-color:rgba(212,175,55,0.6); box-shadow:0 0 15px rgba(212,175,55,0.15); background:rgba(30,20,0,0.9); }
input::placeholder { color:#3a2a08; }

.show-pass {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  cursor:pointer; font-size:16px; opacity:0.6; transition:opacity 0.2s;
}
.show-pass:hover { opacity:1; }

.forgot-link { text-align:right; margin-top:-8px; margin-bottom:16px; }
.forgot-link a { color:#d4af37; font-size:12px; text-decoration:none; cursor:pointer; }

.btn-submit {
  width:100%; padding:15px;
  background: linear-gradient(135deg, #8b6914, #d4af37, #ffd700, #d4af37);
  background-size:200% auto;
  animation: goldShimmer 3s linear infinite;
  color:#000; border:none; border-radius:14px;
  font-size:16px; font-weight:800; cursor:pointer;
  transition:all 0.3s;
  box-shadow: 0 0 25px rgba(212,175,55,0.4), 0 5px 20px rgba(0,0,0,0.5);
  letter-spacing:1px;
}
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(212,175,55,0.6); }
.btn-submit:disabled { opacity:0.6; pointer-events:none; }

.signup-link { text-align:center; font-size:13px; color:#5a3e15; margin-top: 18px; }
.signup-link a { color:#d4af37; text-decoration:none; font-weight:700; }

.error-msg {
  background:rgba(255,50,50,0.1); border:1px solid rgba(255,80,80,0.3);
  border-radius:10px; padding:10px 14px; font-size:12px; color:#ff8080;
  margin-bottom:15px; display:none; text-align:center;
}
.success-msg-box {
  background:rgba(50,255,100,0.1); border:1px solid rgba(80,255,120,0.3);
  border-radius:10px; padding:10px 14px; font-size:12px; color:#80ff9d;
  margin-bottom:15px; display:none; text-align:center;
}

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #000;
  border-radius: 50%;
  display: inline-block;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
</style>
</head>
<body>

<div id="bgWrap">
  <div class="base"></div>
  <div class="veins"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="page">
  <div class="logo-wrap">
    <div class="logo">⚡ ASM PANEL</div>
    <div class="logo-sub">Premium SMM Services</div>
  </div>

  <div class="card">
    <div class="lock-wrap">
      <span class="lock-icon">🔐</span>
    </div>

    <div class="card-title">Welcome Back</div>
    <div class="card-sub">Login to access your ASM Panel account</div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg-box" id="successMsgBox"></div>

    <button class="google-btn" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5h-1.9V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.5 5.5 29.5 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13.5 24 13.5c3.1 0 5.8 1.1 8 3l6-6C34.5 7 29.5 5 24 5c-7.7 0-14.3 4.4-17.7 10.7z"/>
        <path fill="#4CAF50" d="M24 44.5c5.4 0 10.3-1.8 14.1-5l-6.5-5.5c-2.1 1.5-4.8 2.5-7.6 2.5-5.2 0-9.6-3.3-11.2-8l-6.6 5.1C9.5 39.9 16.2 44.5 24 44.5z"/>
        <path fill="#1976D2" d="M43.6 20.5H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.5l6.5 5.5C41.8 36 44.5 30.5 44.5 24c0-1.2-.1-2.4-.3-3.5z"/>
      </svg>
      Login with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or login with email</div>
      <div class="divider-line"></div>
    </div>

    <div class="input-group">
      <label class="input-label">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="Enter your email">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password">
        <span class="show-pass" onclick="togglePass()" id="eyeIcon">👁️</span>
      </div>
    </div>

    <div class="forgot-link">
      <a onclick="handleForgotPassword()">Forgot Password?</a>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">🔓 Login to ASM Panel</button>

    <div class="signup-link">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword,
    GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAO206UbraVsTWu5jV14XidgjMYXLRXQmw",
    authDomain: "famex-y.firebaseapp.com",
    projectId: "famex-y",
    storageBucket: "famex-y.firebasestorage.app",
    messagingSenderId: "623896096501",
    appId: "1:623896096501:web:f6c06ec82cad1a1e685fbc"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.auth = auth;
  window.db = db;
  window.signInWithEmailAndPassword = signInWithEmailAndPassword;
  window.GoogleAuthProvider = GoogleAuthProvider;
  window.signInWithPopup = signInWithPopup;
  window.sendPasswordResetEmail = sendPasswordResetEmail;
  window.doc = doc;
  window.setDoc = setDoc;
  window.getDoc = getDoc;

  window.firebaseReady = true;
</script>

<script>
function togglePass() {
  const pass = document.getElementById('password');
  const eye = document.getElementById('eyeIcon');
  if (pass.type === 'password') {
    pass.type = 'text';
    eye.textContent = '🙈';
  } else {
    pass.type = 'password';
    eye.textContent = '👁️';
  }
}

function showError(msg) {
  const errorMsg = document.getElementById('errorMsg');
  document.getElementById('successMsgBox').style.display = 'none';
  errorMsg.textContent = '❌ ' + msg;
  errorMsg.style.display = 'block';
}

function showSuccess(msg) {
  const box = document.getElementById('successMsgBox');
  document.getElementById('errorMsg').style.display = 'none';
  box.textContent = '✅ ' + msg;
  box.style.display = 'block';
}

function hideMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsgBox').style.display = 'none';
}

async function createUserDocIfMissing(user) {
  const userDocRef = window.doc(window.db, 'users', user.uid);
  const userDocSnap = await window.getDoc(userDocRef);

  if (!userDocSnap.exists()) {
    await window.setDoc(userDocRef, {
      fullName: user.displayName || '',
      username: user.displayName ? user.displayName.replace(/\s+/g, '').toLowerCase() : 'user' + Date.now(),
      email: user.email,
      photoURL: user.photoURL || '',
      balance: 0,
      totalOrders: 0,
      totalSpent: 0,
      rank: 'Bronze',
      verified: false,
      referralCode: 'ASM' + Math.random().toString(36).substring(2, 8).toUpperCase(),
      referredBy: '',
      role: 'user',
      ghosted: false,
      banned: false,
      createdAt: new Date().toISOString()
    });
  }
  return userDocSnap.exists() ? userDocSnap.data() : null;
}

async function handleLogin() {
  hideMessages();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!email) return showError('Please enter your email');
  if (!password) return showError('Please enter your password');

  btn.innerHTML = '<span class="spinner"></span> Logging in...';
  btn.disabled = true;

  try {
    const userCred = await window.signInWithEmailAndPassword(window.auth, email, password);
    const user = userCred.user;

    const userDocRef = window.doc(window.db, 'users', user.uid);
    const userDocSnap = await window.getDoc(userDocRef);

    if (userDocSnap.exists() && userDocSnap.data().banned) {
      btn.innerHTML = '🔓 Login to ASM Panel';
      btn.disabled = false;
      return showError('Your account has been banned. Contact support.');
    }

    window.location.href = 'index.html';

  } catch (err) {
    btn.innerHTML = '🔓 Login to ASM Panel';
    btn.disabled = false;

    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
      showError('Invalid email or password. Please try again.');
    } else if (err.code === 'auth/invalid-email') {
      showError('Please enter a valid email address');
    } else if (err.code === 'auth/too-many-requests') {
      showError('Too many attempts. Please try again later.');
    } else {
      showError(err.message);
    }
  }
}

async function loginWithGoogle() {
  hideMessages();
  try {
    const provider = new window.GoogleAuthProvider();
    const result = await window.signInWithPopup(window.auth, provider);
    const user = result.user;

    const userData = await createUserDocIfMissing(user);

    if (userData && userData.banned) {
      return showError('Your account has been banned. Contact support.');
    }

    window.location.href = 'index.html';
  } catch (err) {
    showError(err.message);
  }
}

async function handleForgotPassword() {
  hideMessages();
  const email = document.getElementById('email').value.trim();

  if (!email) {
    return showError('Please enter your email address first, then tap "Forgot Password?"');
  }

  try {
    await window.sendPasswordResetEmail(window.auth, email);
    showSuccess('Password reset link sent! Check your email inbox.');
  } catch (err) {
    if (err.code === 'auth/user-not-found') {
      showError('No account found with this email');
    } else {
      showError(err.message);
    }
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
