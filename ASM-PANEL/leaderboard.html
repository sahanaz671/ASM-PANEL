<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — ASM Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  font-family:'Segoe UI', sans-serif;
  color:#fff;
  background:#0a0800;
  padding-bottom:100px;
}
@keyframes goldShimmer {
  0% { background-position:-200% center; }
  100% { background-position:200% center; }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes textureMove {
  0% { background-position:0% 0%; }
  50% { background-position:100% 100%; }
  100% { background-position:0% 0%; }
}

/* Background Texture */
#bgWrap { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events: none; }
.base {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% 20%, #3d2a00 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #2a1a00 0%, transparent 50%),
    linear-gradient(135deg, #0d0800 0%, #1a1000 25%, #0f0900 50%, #1f1500 75%, #0a0600 100%);
  animation:textureMove 20s ease-in-out infinite;
  background-size:400% 400%;
}
.veins {
  position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(45deg, transparent 0px, transparent 18px, rgba(212,175,55,0.03) 18px, rgba(212,175,55,0.03) 19px),
    repeating-linear-gradient(-45deg, transparent 0px, transparent 28px, rgba(180,140,40,0.025) 28px, rgba(180,140,40,0.025) 29px);
  background-size:60px 60px, 80px 80px;
}

.content { position:relative; z-index:10; }

/* Navbar */
.navbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(5,3,0,0.9);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(212,175,55,0.2);
  padding:14px 20px;
  display:flex; align-items:center; gap:12px;
}
.back-btn {
  width:36px; height:36px;
  background:rgba(212,175,55,0.1);
  border:1px solid rgba(212,175,55,0.3);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; font-size:16px;
  color:#d4af37;
}
.nav-title {
  font-size:18px; font-weight:800;
  background:linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #d4af37, #b8860b);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:goldShimmer 2.5s linear infinite;
}

.page { padding:85px 20px 20px; max-width:500px; margin:0 auto; animation: slideUp 0.8s ease; }

/* Podium Section */
.podium-wrap {
  display: flex; justify-content: center; align-items: flex-end;
  gap: 15px; margin-bottom: 30px; margin-top: 20px;
}
.podium-box {
  background: linear-gradient(135deg, rgba(15,10,0,0.92), rgba(28,18,0,0.92));
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 16px 16px 8px 8px;
  display: flex; flex-direction: column; align-items: center;
  padding: 15px 10px; text-align: center; width: 100px;
}
.podium-1 { height: 160px; border-color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
.podium-2 { height: 130px; border-color: #c0c0c0; }
.podium-3 { height: 110px; border-color: #cd7f32; }

.podium-avatar { font-size: 30px; margin-bottom: 8px; }
.podium-name { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; width: 100%; white-space: nowrap; }
.podium-score { font-size: 11px; color: #d4af37; font-weight: 800; }
.p1-score { color: #ffd700; font-size: 13px; }

/* Leaderboard List */
.lb-list { display: flex; flex-direction: column; gap: 10px; }
.lb-card {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(20,13,0,0.8);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 12px; padding: 12px 15px;
}
.lb-left { display: flex; align-items: center; gap: 15px; }
.lb-rank { font-size: 16px; font-weight: 900; color: #8b6520; width: 20px; text-align: center; }
.lb-user-info { display: flex; flex-direction: column; }
.lb-user-name { font-size: 14px; font-weight: 700; color: #fff; }
.lb-user-badge { font-size: 10px; color: #a08050; text-transform: uppercase; letter-spacing: 0.5px; }
.lb-score { font-size: 14px; font-weight: 800; color: #d4af37; }

/* Bottom Nav */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(5,3,0,0.95); backdrop-filter:blur(24px);
  border-top:1px solid rgba(212,175,55,0.25);
  display:flex; justify-content:space-around; padding:10px 0 14px;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; text-decoration:none; color:#5a3e15; transition:all 0.3s; font-size:10px;
}
.nav-item.active, .nav-item:hover { color:#d4af37; }
.nav-item span:first-child { font-size:20px; }
</style>
</head>
<body>

<div class="content">
  <nav class="navbar">

      <div class="podium-box podium-3">

        </div>

      </div>

      <div class="lb-card">
        <div class="lb-left">
          <div class="lb-rank">6</div>
          <div class="lb-user-info">
            <div class="lb-user-name">@asm_fan</div>

        </div>
        <div class="lb-score">₹ 2,900</div>

    </div>

  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span>🏠</span><span>Home</span></a>
  <a href="services.html" class="nav-item"><span>🛍️</span><span>Services</span></a>
  <a href="order.html" class="nav-item"><span>📦</span><span>Order</span></a>

</nav>

</body>
</html>
