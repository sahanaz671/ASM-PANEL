<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services — ASM Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; font-family:'Segoe UI', sans-serif; color:#fff; background:#0a0800; padding-bottom:80px; }
@keyframes goldShimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
@keyframes pulse { 0%,100% { box-shadow:0 0 20px #d4af3744; } 50% { box-shadow:0 0 45px #d4af37aa; } }
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes shimmerLine { 0% { left:-100%; } 100% { left:200%; } }
@keyframes textureMove { 0% { background-position:0% 0%; } 50% { background-position:100% 100%; } 100% { background-position:0% 0%; } }
@keyframes orbFloat { 0%,100% { transform:translateY(0) scale(1); } 50% { transform:translateY(-20px) scale(1.05); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

#bgWrap { position:fixed; inset:0; z-index:0; overflow:hidden; }
.base { position:absolute; inset:0; background: radial-gradient(ellipse at 20% 20%, #3d2a00 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, #2a1a00 0%, transparent 50%), linear-gradient(135deg, #0d0800 0%, #1a1000 25%, #0f0900 50%, #1f1500 75%, #0a0600 100%); animation:textureMove 20s ease-in-out infinite; background-size:400% 400%; }
.veins { position:absolute; inset:0; background-image: repeating-linear-gradient(45deg, transparent 0px, transparent 18px, rgba(212,175,55,0.03) 18px, rgba(212,175,55,0.03) 19px), repeating-linear-gradient(-45deg, transparent 0px, transparent 28px, rgba(180,140,40,0.025) 28px, rgba(180,140,40,0.025) 29px); background-size:60px 60px, 80px 80px; }
.orb { position:absolute; border-radius:50%; filter:blur(70px); animation:orbFloat ease-in-out infinite; }
.orb1 { width:300px; height:300px; background:radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); top:-80px; left:-60px; animation-duration:12s; }
.orb2 { width:250px; height:250px; background:radial-gradient(circle, rgba(255,200,50,0.07) 0%, transparent 70%); bottom:20%; right:-40px; animation-duration:15s; animation-delay:4s; }
.content { position:relative; z-index:10; }
.navbar { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(5,3,0,0.9); backdrop-filter:blur(24px); border-bottom:1px solid rgba(212,175,55,0.2); padding:14px 20px; display:flex; align-items:center; gap:12px; }
.back-btn { width:36px; height:36px; background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; font-size:16px; transition:all 0.3s; }
.nav-title { font-size:18px; font-weight:800; background:linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #d4af37, #b8860b); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:goldShimmer 2.5s linear infinite; }
.balance-chip { margin-left:auto; background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3); border-radius:20px; padding:6px 14px; font-size:12px; color:#d4af37; font-weight:700; }
.search-wrap { padding:75px 20px 15px; position:relative; }
.search-input { width:100%; padding:13px 14px 13px 44px; background:rgba(15,10,0,0.85); border:1px solid rgba(212,175,55,0.25); border-radius:14px; color:#fff; font-size:14px; outline:none; font-family:'Segoe UI', sans-serif; }
.search-icon { position:absolute; left:34px; top:50%; transform:translateY(-50%); font-size:16px; margin-top:30px; }
.cats { display:flex; gap:8px; padding:0 20px 15px; overflow-x:auto; scrollbar-width:none; }
.cat-tab { display:flex; align-items:center; gap:6px; padding:8px 16px; background:rgba(15,10,0,0.8); border:1px solid rgba(212,175,55,0.2); border-radius:25px; white-space:nowrap; cursor:pointer; font-size:13px; color:#6b5020; font-weight:600; }
.cat-tab.active { background:linear-gradient(135deg, #8b6914, #d4af37); border-color:#d4af37; color:#000; }
.services-wrap { padding:0 20px; }
.platform-section { margin-bottom:25px; animation:fadeIn 0.5s ease; }
.platform-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.platform-icon { font-size:24px; }
.platform-name { font-size:16px; font-weight:800; background:linear-gradient(90deg, #d4af37, #ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.service-item { background:linear-gradient(135deg, rgba(15,10,0,0.88), rgba(25,17,0,0.88)); border:1px solid rgba(212,175,55,0.2); border-radius:15px; padding:15px; margin-bottom:10px; cursor:pointer; position:relative; }
.service-name { font-size:14px; font-weight:700; color:#e8c87a; }
.service-desc { font-size:11px; color:#5a3e15; }
.service-bottom { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
.price-value { font-size:16px; font-weight:800; color:#d4af37; }
.btn-order { padding:9px 20px; background:linear-gradient(135deg, #d4af37, #ffd700); color:#000; border:none; border-radius:25px; font-size:13px; font-weight:800; }
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:100; background:rgba(5,3,0,0.95); backdrop-filter:blur(24px); border-top:1px solid rgba(212,175,55,0.2); display:flex; justify-content:space-around; padding:10px 0 14px; }
.nav-item { display:flex; flex-direction:column; align-items:center; color:#444; text-decoration:none; font-size:10px; }
.nav-item.active { color:#d4af37; }
</style>
</head>
<body>

<div id="bgWrap">
  <div class="base"></div>
  <div class="veins"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="content">
  <nav class="navbar">
    <a href="index.html" class="back-btn">←</a>
    <div class="nav-title">Services</div>
    <div class="balance-chip">💰 ₹0.00</div>
  </nav>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Search services..." id="searchInput">
  </div>

  <div class="cats" id="catTabs">
    <div class="cat-tab active" onclick="filterCat('all')">All</div>
    <div class="cat-tab" onclick="filterCat('instagram')">Instagram</div>
    <div class="cat-tab" onclick="filterCat('youtube')">YouTube</div>
  </div>

  <div class="services-wrap" id="servicesWrap">
    </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span>🏠</span>Home</a>
  <a href="services.html" class="nav-item active"><span>⚙️</span>Services</a>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAO206UbraVsTWu5jV14XidgjMYXLRXQmw",
    authDomain: "famex-y.firebaseapp.com",
    projectId: "famex-y",
    storageBucket: "famex-y.firebasestorage.app",
    messagingSenderId: "623896096501",
    appId: "1:623896096501:web:f6c06ec82cad1a1e685fbc"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadDynamicServices() {
    const servicesWrap = document.getElementById('servicesWrap');
    const querySnapshot = await getDocs(collection(db, "services"));
    
    servicesWrap.innerHTML = '';

    querySnapshot.forEach((doc) => {
      const s = doc.data();
      const div = document.createElement('div');
      div.className = 'platform-section';
      
      div.innerHTML = `
        <div class="platform-header">
          <span class="platform-name">${s.category || 'General'}</span>
        </div>
        <div class="service-item">
          <div class="service-top">
            <div class="service-info">
              <div class="service-name">${s.name}</div>
              <div class="service-desc">${s.desc || 'No description'}</div>
            </div>
          </div>
          <div class="service-bottom">
            <div class="price-wrap">
              <span class="price-value">₹${s.price}</span>
            </div>
            <button class="btn-order">Order Now</button>
          </div>
        </div>
      `;
      servicesWrap.appendChild(div);
    });
  }

  loadDynamicServices();
</script>
</body>
</html>
