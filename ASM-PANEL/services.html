<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = { /* YOUR CONFIG */ };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadServices() {
    const servicesWrap = document.getElementById('servicesWrap');
    const snapshot = await getDocs(collection(db, "services"));
    
    // We clear ONLY the list, keeping your navbar/search/cats intact
    servicesWrap.innerHTML = ''; 

    snapshot.forEach((doc) => {
      const s = doc.data();
      const div = document.createElement('div');
      div.className = 'platform-section';
      div.innerHTML = `
        <div class="platform-header">
          <span class="platform-icon">${s.icon}</span>
          <span class="platform-name">${s.category}</span>
        </div>
        <div class="service-item">
          ${s.popular ? '<div class="badge-popular">🔥 POPULAR</div>' : ''}
          <div class="service-top">
            <span class="service-emoji">${s.emoji}</span>
            <div class="service-info">
              <div class="service-name">${s.name}</div>
              <div class="service-desc">${s.desc}</div>
            </div>
          </div>
          <div class="service-bottom">
            <div class="price-wrap">
              <span class="price-label">Price per 1000</span>
              <span class="price-value">₹${s.price}</span>
              <span class="price-unit">Min: ${s.min} | Max: ${s.max}</span>
            </div>
            <span class="btn-order">Order Now</span>
          </div>
        </div>`;
      servicesWrap.appendChild(div);
    });
  }
  loadServices();
</script>
