<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Funds — ASM Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  font-family:'Segoe UI', sans-serif;
  color:#fff;
  background:#0a0800;
  padding-bottom:100px;
}
@keyframes goldShimmer {
  0% { background-position:-200% center; }
  100% { background-position:200% center; }
}
@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-8px); }
}
@keyframes pulse {
  0%,100% { box-shadow:0 0 20px #d4af3744; }
  50% { box-shadow:0 0 45px #d4af37aa; }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes shimmerLine {
  0% { left:-100%; }
  100% { left:200%; }
}
@keyframes textureMove {
  0% { background-position:0% 0%; }
  50% { background-position:100% 100%; }
  100% { background-position:0% 0%; }
}
@keyframes orbFloat {
  0%,100% { transform:translateY(0) scale(1); }
  50% { transform:translateY(-20px) scale(1.05); }
}

/* Background Texture */
#bgWrap { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events: none; }
.base {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% 20%, #3d2a00 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #2a1a00 0%, transparent 50%),
    linear-gradient(135deg, #0d0800 0%, #1a1000 25%, #0f0900 50%, #1f1500 75%, #0a0600 100%);
  animation:textureMove 20s ease-in-out infinite;
  background-size:400% 400%;
}
.veins {
  position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(45deg, transparent 0px, transparent 18px, rgba(212,175,55,0.03) 18px, rgba(212,175,55,0.03) 19px),
    repeating-linear-gradient(-45deg, transparent 0px, transparent 28px, rgba(180,140,40,0.025) 28px, rgba(180,140,40,0.025) 29px);
  background-size:60px 60px, 80px 80px;
}
.orb { position:absolute; border-radius:50%; filter:blur(70px); animation:orbFloat ease-in-out infinite; }
.orb1 { width:300px; height:300px; background:radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); top:-80px; left:-60px; animation-duration:12s; }
.orb2 { width:250px; height:250px; background:radial-gradient(circle, rgba(255,200,50,0.07) 0%, transparent 70%); bottom:20%; right:-40px; animation-duration:15s; animation-delay:4s; }

.content { position:relative; z-index:10; }

/* Navbar */
.navbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(5,3,0,0.9);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(212,175,55,0.2);
  padding:14px 20px;
  display:flex; justify-content:space-between; align-items:center;
}
.nav-title {
  font-size:20px; font-weight:900;
  background:linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #ffe566, #d4af37, #b8860b);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:goldShimmer 2.5s linear infinite;
  letter-spacing: 2px;
}
.btn-balance {
  padding: 8px 16px;
  border-radius: 25px;
  background: rgba(212,175,55,0.1);
  border: 1px solid #d4af37;
  color: #ffd700;
  font-size: 13px;
  font-weight: 700;
}

.page { padding:90px 20px 20px; max-width:500px; margin:0 auto; animation: slideUp 0.8s ease; }

/* QR Code Section */
.qr-card {
  background:linear-gradient(135deg, rgba(15,10,0,0.92), rgba(28,18,0,0.92));
  border:1px solid rgba(212,175,55,0.3);
  border-radius:24px;
  padding:30px 24px;
  backdrop-filter:blur(20px);
  position:relative; overflow:hidden;
  animation:pulse 3s infinite;
  text-align: center;
  margin-bottom: 25px;
}
.qr-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, #ffd700, #d4af37, #ffd700, transparent);
  animation:goldShimmer 2s linear infinite; background-size:200% auto;
}
.qr-title {
  font-size:20px; font-weight:800; color:#fff;
  margin-bottom:8px;
}
.qr-sub {
  color:#a08050; font-size:13px; margin-bottom:20px; line-height:1.5;
}
.qr-image-wrap {
  width: 220px;
  height: 220px;
  margin: 0 auto 20px;
  background: #fff;
  padding: 10px;
  border-radius: 16px;
  border: 2px solid #d4af37;
}
.qr-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

/* Payment Form */
.form-card {
  background:linear-gradient(135deg, rgba(15,10,0,0.92), rgba(28,18,0,0.92));
  border:1px solid rgba(212,175,55,0.25);
  border-radius:20px;
  padding:25px;
  backdrop-filter:blur(20px);
}
.form-title {
  font-size:18px; font-weight:700; color:#ffd700;
  margin-bottom:20px; text-align:center;
}
.input-group { margin-bottom:16px; }
.input-label { font-size:12px; color:#8b6520; margin-bottom:6px; display:block; font-weight:600; letter-spacing:0.5px; }
.input-wrap { position:relative; }

input[type="text"], input[type="number"] {
  width:100%; padding:14px;
  background:rgba(20,13,0,0.8);
  border:1px solid rgba(212,175,55,0.2);
  border-radius:12px;
  color:#fff; font-size:14px; outline:none;
  transition:all 0.3s;
}
input:focus {
  border-color:rgba(212,175,55,0.6);
  box-shadow:0 0 15px rgba(212,175,55,0.15);
  background:rgba(30,20,0,0.9);
}
input::placeholder { color:#5a3e15; }

.btn-submit {
  width:100%; padding:15px; margin-top:10px;
  background:linear-gradient(135deg, #8b6914, #d4af37, #ffd700, #d4af37);
  background-size:200% auto; animation:goldShimmer 3s linear infinite;
  color:#000; border:none; border-radius:14px;
  font-size:16px; font-weight:800; cursor:pointer;
  transition:all 0.3s; box-shadow:0 0 25px rgba(212,175,55,0.4);
}
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(212,175,55,0.6); }

/* Bottom Nav */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(5,3,0,0.95); backdrop-filter:blur(24px);
  border-top:1px solid rgba(212,175,55,0.2);
  display:flex; justify-content:space-around; padding:10px 0 14px;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; text-decoration:none; color:#5a3e15; transition:all 0.3s; font-size:10px;
}
.nav-item.active, .nav-item:hover { color:#d4af37; }
.nav-item span:first-child { font-size:20px; }
</style>
</head>
<body>

<div id="bgWrap">
  <div class="base"></div>
  <div class="veins"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="content">
  <nav class="navbar">
    <div class="nav-title">⚡ ASM PANEL</div>
    <div class="btn-balance">₹ 0.00</div>
  </nav>

  <div class="page">
    <div class="qr-card">
      <div class="qr-title">Add Funds via PhonePe</div>
      <div class="qr-sub">Scan the QR code below or use the UPI ID to send payment. Minimum deposit: ₹100.</div>
      <div class="qr-image-wrap">
        <img src="https://via.placeholder.com/200x200.png?text=Your+PhonePe+QR" alt="PhonePe QR">
      </div>
      <div style="font-size: 14px; font-weight: 700; color: #ffd700; letter-spacing: 1px;">UPI ID: your-upi@ybl</div>
    </div>

    <div class="form-card">
      <div class="form-title">Payment Verification</div>
      
      <div class="input-group">
        <label class="input-label">Amount Paid (₹)</label>
        <div class="input-wrap">
          <input type="number" id="payAmount" placeholder="Enter amount">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Transaction ID / UTR</label>
        <div class="input-wrap">
          <input type="text" id="payTxnId" placeholder="e.g. T2305...">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Your PhonePe Name</label>
        <div class="input-wrap">
          <input type="text" id="payName" placeholder="Name on your PhonePe account">
        </div>
      </div>

      <button class="btn-submit" onclick="submitPayment()">✅ Submit Payment Proof</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span>🏠</span><span>Home</span></a>
  <a href="services.html" class="nav-item"><span>🛍️</span><span>Services</span></a>
  <a href="order.html" class="nav-item"><span>📦</span><span>Order</span></a>
  <a href="funds.html" class="nav-item active"><span>💰</span><span>Funds</span></a>
  <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
</nav>

<script>
  function submitPayment() {
    const amount = document.getElementById('payAmount').value.trim();
    const txnId = document.getElementById('payTxnId').value.trim();
    const name = document.getElementById('payName').value.trim();

    if (!amount || amount < 100) { alert('Minimum deposit is ₹100.'); return; }
    if (!txnId) { alert('Please enter your Transaction ID or UTR.'); return; }
    if (!name) { alert('Please enter your PhonePe name.'); return; }

    const btn = document.querySelector('.btn-submit');
    btn.textContent = '⏳ Processing...';
    btn.style.pointerEvents = 'none';

    setTimeout(() => {
      alert('Payment details submitted! An admin will verify and add the funds to your account shortly.');
      window.location.reload();
    }, 1500);
  }
</script>
</body>
</html>
