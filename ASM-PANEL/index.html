<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASM Panel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
  background: #0a0800;
}

@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 20px #d4af3755; }
  50% { box-shadow: 0 0 45px #d4af37bb; }
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes cardGlow {
  0%,100% { box-shadow: 0 0 30px #d4af3733, 0 20px 60px #00000088; }
  50% { box-shadow: 0 0 60px #d4af3766, 0 20px 60px #00000088; }
}
@keyframes textureMove {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
@keyframes goldFlow {
  0% { transform: translateX(-100%) rotate(45deg); opacity:0; }
  50% { opacity:0.15; }
  100% { transform: translateX(200%) rotate(45deg); opacity:0; }
}
@keyframes particleDrift {
  0% { transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
  10% { opacity:1; }
  90% { opacity:0.8; }
  100% { transform: translateY(-80px) translateX(30px) rotate(360deg); opacity:0; }
}
@keyframes shimmerLine {
  0% { left:-100%; }
  100% { left:200%; }
}

/* GOLD TEXTURE BACKGROUND */
#bgWrap {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Deep gold base */
#bgWrap .base {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, #3d2a00 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #2a1a00 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #1a1000 0%, transparent 70%),
    linear-gradient(135deg, #0d0800 0%, #1a1000 25%, #0f0900 50%, #1f1500 75%, #0a0600 100%);
  animation: textureMove 20s ease-in-out infinite;
  background-size: 400% 400%;
}

/* Gold vein texture */
#bgWrap .veins {
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      45deg,
      transparent 0px,
      transparent 18px,
      rgba(212,175,55,0.03) 18px,
      rgba(212,175,55,0.03) 19px
    ),
    repeating-linear-gradient(
      -45deg,
      transparent 0px,
      transparent 28px,
      rgba(180,140,40,0.025) 28px,
      rgba(180,140,40,0.025) 29px
    ),
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 38px,
      rgba(212,175,55,0.015) 38px,
      rgba(212,175,55,0.015) 39px
    );
  animation: textureMove 30s ease-in-out infinite reverse;
  background-size: 60px 60px, 80px 80px, 100px 100px;
}

/* Gold glow orbs */
#bgWrap .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: float ease-in-out infinite;
}
#bgWrap .orb1 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%);
  top: -100px; left: -80px;
  animation-duration: 12s;
}
#bgWrap .orb2 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(255,200,50,0.08) 0%, transparent 70%);
  top: 30%; right: -60px;
  animation-duration: 15s;
  animation-delay: 3s;
}
#bgWrap .orb3 {
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(180,130,20,0.1) 0%, transparent 70%);
  bottom: 10%; left: 10%;
  animation-duration: 18s;
  animation-delay: 6s;
}
#bgWrap .orb4 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,215,0,0.07) 0%, transparent 70%);
  top: 60%; right: 20%;
  animation-duration: 10s;
  animation-delay: 2s;
}

/* Sweeping gold light beams */
#bgWrap .beam {
  position: absolute;
  width: 3px;
  height: 140%;
  top: -20%;
  background: linear-gradient(to bottom, transparent, rgba(212,175,55,0.06), rgba(255,215,0,0.1), rgba(212,175,55,0.06), transparent);
  animation: goldFlow linear infinite;
  transform-origin: top center;
}
#bgWrap .beam1 { animation-duration: 8s; animation-delay: 0s; left: 20%; }
#bgWrap .beam2 { animation-duration: 11s; animation-delay: 3s; left: 50%; }
#bgWrap .beam3 { animation-duration: 9s; animation-delay: 6s; left: 75%; }

/* Canvas for particles */
#particleCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Main content */
.content { position: relative; z-index: 10; }

.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(5,3,0,0.85);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(212,175,55,0.25);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 20px;
  font-weight: 900;
  background: linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #ffe566, #d4af37, #b8860b);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: goldShimmer 2.5s linear infinite;
  letter-spacing: 2px;
}

.nav-links { display: flex; gap: 8px; }

.nav-btn {
  padding: 8px 16px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.3s;
  text-decoration: none;
  border: none;
}

.btn-login {
  background: transparent;
  border: 1.5px solid #d4af37;
  color: #d4af37;
}

.btn-signup {
  background: linear-gradient(135deg, #8b6914, #d4af37, #ffd700, #d4af37);
  background-size: 200% auto;
  animation: goldShimmer 3s linear infinite;
  color: #000;
  font-weight: 800;
}

.btn-signup:hover, .btn-login:hover {
  transform: scale(1.06);
  box-shadow: 0 0 25px #d4af3788;
}

.announcement {
  margin: 80px 20px 0;
  background: linear-gradient(135deg, rgba(20,13,0,0.9), rgba(35,23,0,0.9));
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 15px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: pulse 3s infinite;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}

.announcement::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.08), transparent);
  animation: shimmerLine 3s linear infinite;
}

.announcement-icon { font-size: 22px; }
.announcement-text { font-size: 13px; color: #d4af37; line-height: 1.5; }

.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 40px 20px 20px;
}

.hero-badge {
  background: linear-gradient(135deg, rgba(20,13,0,0.9), rgba(40,28,0,0.9));
  border: 1px solid rgba(212,175,55,0.4);
  color: #d4af37;
  padding: 8px 22px;
  border-radius: 25px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 25px;
  animation: pulse 2.5s infinite;
  backdrop-filter: blur(10px);
}

.hero-title {
  font-size: 40px;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 18px;
  animation: slideIn 1s ease;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 0 40px rgba(212,175,55,0.15);
}

.gold {
  background: linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #ffe566, #d4af37, #b8860b);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: goldShimmer 2.5s linear infinite;
}

.hero-sub {
  font-size: 14px;
  color: #a08050;
  max-width: 440px;
  line-height: 1.7;
  margin-bottom: 35px;
  animation: slideIn 1.2s ease;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 40px;
}

.btn-primary {
  padding: 14px 32px;
  background: linear-gradient(135deg, #8b6914, #d4af37, #ffd700, #d4af37);
  background-size: 200% auto;
  animation: goldShimmer 3s linear infinite;
  color: #000;
  border: none;
  border-radius: 35px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s;
  box-shadow: 0 0 30px #d4af3755, 0 5px 20px rgba(0,0,0,0.5);
}

.btn-secondary {
  padding: 14px 32px;
  background: rgba(212,175,55,0.08);
  color: #d4af37;
  border: 2px solid #d4af37;
  border-radius: 35px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.btn-primary:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 0 50px #d4af37aa; }
.btn-secondary:hover { background: rgba(212,175,55,0.15); transform: translateY(-3px); }

.hero-card {
  background: linear-gradient(135deg, rgba(15,10,0,0.9), rgba(25,18,0,0.9));
  border: 1px solid rgba(212,175,55,0.35);
  border-radius: 20px;
  padding: 22px;
  width: 100%;
  max-width: 340px;
  animation: float 4s ease-in-out infinite, cardGlow 3s ease-in-out infinite;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #ffd700, #d4af37, #ffd700, transparent);
  animation: goldShimmer 2s linear infinite;
  background-size: 200% auto;
}

.hero-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(212,175,55,0.03) 0%, transparent 50%, rgba(212,175,55,0.03) 100%);
  pointer-events: none;
}

.card-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid rgba(212,175,55,0.12);
}

.card-stat:last-child { border-bottom: none; }
.stat-label { color: #6b5020; font-size: 13px; }
.stat-value {
  font-weight: 700;
  background: linear-gradient(90deg, #d4af37, #ffd700, #ffe566);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 14px;
}

.stats {
  padding: 30px 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  max-width: 460px;
  margin: 0 auto;
}

.stat-card {
  background: linear-gradient(135deg, rgba(15,10,0,0.85), rgba(25,18,0,0.85));
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 15px;
  padding: 20px 15px;
  text-align: center;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.06), transparent);
  animation: shimmerLine 4s linear infinite;
}

.stat-card:hover {
  transform: translateY(-5px);
  border-color: #d4af37;
  box-shadow: 0 10px 30px rgba(212,175,55,0.2);
}

.stat-number {
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(90deg, #d4af37, #ffd700, #ffe566);
  -webkit-background-clip: text
