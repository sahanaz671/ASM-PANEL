<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support — ASM Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  font-family:'Segoe UI', sans-serif;
  color:#fff;
  background:#0a0800;
  padding-bottom:100px;
}
@keyframes goldShimmer {
  0% { background-position:-200% center; }
  100% { background-position:200% center; }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes textureMove {
  0% { background-position:0% 0%; }
  50% { background-position:100% 100%; }
  100% { background-position:0% 0%; }
}

/* Background Texture */
#bgWrap { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events: none; }
.base {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% 20%, #3d2a00 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #2a1a00 0%, transparent 50%),
    linear-gradient(135deg, #0d0800 0%, #1a1000 25%, #0f0900 50%, #1f1500 75%, #0a0600 100%);
  animation:textureMove 20s ease-in-out infinite;
  background-size:400% 400%;
}
.veins {
  position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(45deg, transparent 0px, transparent 18px, rgba(212,175,55,0.03) 18px, rgba(212,175,55,0.03) 19px),
    repeating-linear-gradient(-45deg, transparent 0px, transparent 28px, rgba(180,140,40,0.025) 28px, rgba(180,140,40,0.025) 29px);
  background-size:60px 60px, 80px 80px;
}

.content { position:relative; z-index:10; }

/* Navbar */
.navbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(5,3,0,0.9);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(212,175,55,0.2);
  padding:14px 20px;
  display:flex; align-items:center; gap:12px;
}
.back-btn {
  width:36px; height:36px;
  background:rgba(212,175,55,0.1);
  border:1px solid rgba(212,175,55,0.3);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; font-size:16px;
  color:#d4af37;
  transition: 0.3s;
}
.back-btn:hover { background: rgba(212,175,55,0.2); }
.nav-title {
  font-size:18px; font-weight:800;
  background:linear-gradient(90deg, #b8860b, #d4af37, #ffd700, #d4af37, #b8860b);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:goldShimmer 2.5s linear infinite;
}

.page { padding:85px 20px 20px; max-width:500px; margin:0 auto; animation: slideUp 0.8s ease; }

/* Cards */
.card {
  background: linear-gradient(135deg, rgba(15,10,0,0.92), rgba(28,18,0,0.92));
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 16px; padding: 20px; margin-bottom: 20px;
  backdrop-filter: blur(20px);
}
.card-title { 
  font-size: 16px; font-weight: 700; color: #ffd700; 
  margin-bottom: 15px; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 10px; 
}
.card-text { font-size: 13px; color: #a08050; margin-bottom: 20px; line-height: 1.5; }

/* Form inputs */
.input-group { margin-bottom: 15px; }
.input-label { font-size: 12px; color: #8b6520; margin-bottom: 6px; display: block; font-weight: 600; letter-spacing: 0.5px; }
input[type="text"], select, textarea {
  width: 100%; padding: 12px;
  background: rgba(20,13,0,0.8);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 10px; color: #fff; font-size: 14px;
  outline: none; font-family: inherit;
}
textarea { resize: vertical; min-height: 100px; }
input:focus, select:focus, textarea:focus { 
  border-color: rgba(212,175,55,0.6); background: rgba(30,20,0,0.9); 
}

.btn-submit {
  width: 100%; padding: 14px; margin-top: 10px;
  background: linear-gradient(135deg, #8b6914, #d4af37);
  color: #000; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s;
}
.btn-submit:hover { box-shadow: 0 0 15px rgba(212,175,55,0.4); transform: translateY(-2px); }

/* Quick Contact */
.whatsapp-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 14px;
  background: rgba(37, 211, 102, 0.1);
  border: 1px solid #25D366; color: #25D366; border-radius: 12px;
  font-size: 15px; font-weight: 800; text-decoration: none; transition: 0.3s;
}
.whatsapp-btn:hover { background: rgba(37, 211, 102, 0.2); transform: translateY(-2px); box-shadow: 0 0 15px rgba(37, 211, 102, 0.2); }

/* Bottom Nav */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(5,3,0,0.95); backdrop-filter:blur(24px);
  border-top:1px solid rgba(212,175,55,0.25);
  display:flex; justify-content:space-around; padding:10px 0 14px;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; text-decoration:none; color:#5a3e15; transition:all 0.3s; font-size:10px;
}
.nav-item.active, .nav-item:hover { color:#d4af37; }
.nav-item span:first-child { font-size:20px; }
</style>
</head>
<body>

<div id="bgWrap">
  <div class="base"></div>
  <div class="veins"></div>
</div>

<div class="content">
  <nav class="navbar">
    <a href="profile.html" class="back-btn">←</a>
    <div class="nav-title">💬 Support</div>
  </nav>

  <div class="page">
    
    <div class="card">
      <div class="card-title">Need Help Faster?</div>
      <div class="card-text">Our support team is available on WhatsApp from 10:00 AM to 8:00 PM. Tap the button below to chat with us directly!</div>
      <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-btn">
        <span>💬</span> Chat on WhatsApp
      </a>
    </div>

    <div class="card">
      <div class="card-title">Create a Support Ticket</div>
      
      <div class="input-group">
        <label class="input-label">Subject</label>
        <select id="supportSubject">
          <option value="order">Order Issue (Pending / Not Started)</option>
          <option value="payment">Payment Issue (Funds not added)</option>
          <option value="bug">Report a Bug</option>
          <option value="other">Other Inquiry</option>
        </select>
      </div>

      <div class="input-group">
        <label class="input-label">Order ID / Transaction ID (Optional)</label>
        <input type="text" id="supportId" placeholder="e.g. #ASM82741">
      </div>

      <div class="input-group">
        <label class="input-label">Message</label>
        <textarea id="supportMessage" placeholder="Describe your issue in detail..."></textarea>
      </div>

      <button class="btn-submit" onclick="submitTicket()">📨 Submit Ticket</button>
    </div>

  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span>🏠</span><span>Home</span></a>
  <a href="services.html" class="nav-item"><span>🛍️</span><span>Services</span></a>
  <a href="order.html" class="nav-item"><span>📦</span><span>Order</span></a>
  <a href="funds.html" class="nav-item"><span>💰</span><span>Funds</span></a>
  <a href="profile.html" class="nav-item active"><span>👤</span><span>Profile</span></a>
</nav>

<script>
  function submitTicket() {
    const message = document.getElementById('supportMessage').value.trim();
    if(!message) {
      alert("Please enter a message describing your issue.");
      return;
    }
    
    const btn = document.querySelector('.btn-submit');
    btn.textContent = '⏳ Sending...';
    btn.style.pointerEvents = 'none';

    setTimeout(() => {
      alert("Your ticket has been submitted successfully! We will get back to you within 24 hours.");
      document.getElementById('supportMessage').value = '';
      document.getElementById('supportId').value = '';
      btn.textContent = '📨 Submit Ticket';
      btn.style.pointerEvents = 'auto';
    }, 1500);
  }
</script>

</body>
</html>
